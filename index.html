<!DOCTYPE HTML>
<html>
<head>
    <title>Cho Thanh Xuân của tôi</title>

    <style>
        html,body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
        }

        canvas{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
        }
    </style>
</head>

<body>

<canvas id="heart"></canvas>

<script>

window.requestAnimationFrame =
    window.requestAnimationFrame ||
    window.webkitRequestAnimationFrame ||
    window.mozRequestAnimationFrame ||
    function(callback){
        return setTimeout(callback,16);
    };

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

let width, height;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

const mobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent);

const rand = Math.random;

function heartPosition(rad){
    return [
        Math.pow(Math.sin(rad), 3),
        -(
            15 * Math.cos(rad)
            - 5 * Math.cos(2 * rad)
            - 2 * Math.cos(3 * rad)
            - Math.cos(4 * rad)
        )
    ];
}

function scaleAndTranslate(pos, sx, sy, dx, dy){
    return [
        dx + pos[0] * sx,
        dy + pos[1] * sy
    ];
}

const traceCount = mobile ? 25 : 50;

const pointsOrigin = [];

let dr = mobile ? 0.3 : 0.1;

for(let i=0;i<Math.PI*2;i+=dr){
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            210,
            13,
            0,
            0
        )
    );
}

for(let i=0;i<Math.PI*2;i+=dr){
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            150,
            9,
            0,
            0
        )
    );
}

for(let i=0;i<Math.PI*2;i+=dr){
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            90,
            5,
            0,
            0
        )
    );
}

const heartPointsCount = pointsOrigin.length;

const targetPoints = [];

function pulse(scale){

    for(let i=0;i<pointsOrigin.length;i++){

        targetPoints[i] = [];

        targetPoints[i][0] =
            pointsOrigin[i][0] * scale + width/2;

        targetPoints[i][1] =
            pointsOrigin[i][1] * scale + height/2;
    }
}

const particles = [];

for(let i=0;i<heartPointsCount;i++){

    const x = rand() * width;
    const y = rand() * height;

    particles[i] = {

        vx:0,
        vy:0,

        R:2,

        speed: rand() * 0.8 + 4.2,

        q: ~~(rand() * heartPointsCount),

        D: 2 * (i % 2) - 1,

        force: 0.92,

        f:
            "hsla(" +
            (rand()*10) +
            "," +
            ~~(40*rand()+60) +
            "%," +
            ~~(60*rand()+20) +
            "%,.35)",

        trace:[]
    };

    for(let k=0;k<traceCount;k++){

        particles[i].trace[k] = {
            x:x,
            y:y
        };
    }
}

const config = {
    traceK:0.35
};

let lastBeat = 0;
let beatProgress = 0;

// ECG-LIKE HEARTBEAT
function realisticHeartbeat(t){

    // ~75 BPM
    const bpm = 75;

    const beatDuration = 60 / bpm;

    const phase = (t % beatDuration) / beatDuration;

    let scale = 1;

    // MAIN HEART CONTRACTION
    if(phase < 0.12){

        scale += Math.sin(phase / 0.12 * Math.PI) * 0.18;
    }

    // SECONDARY SMALLER CONTRACTION
    else if(phase > 0.18 && phase < 0.28){

        scale += Math.sin((phase - 0.18)/0.10 * Math.PI) * 0.07;
    }

    return scale;
}

let start = performance.now();

function loop(now){

    requestAnimationFrame(loop);

    const t = (now - start) / 1000;

    // realistic pulse
    const scale = realisticHeartbeat(t);

    pulse(scale);

    // background fade
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,width,height);

    // soft glow
    const glow = ctx.createRadialGradient(
        width/2,
        height/2,
        50,
        width/2,
        height/2,
        320
    );

    glow.addColorStop(0,"rgba(255,0,70,0.08)");
    glow.addColorStop(1,"rgba(255,0,0,0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0,0,width,height);

    for(let i=particles.length;i--;){

        const u = particles[i];

        const q = targetPoints[u.q];

        const dx = u.trace[0].x - q[0];
        const dy = u.trace[0].y - q[1];

        const length = Math.sqrt(dx*dx + dy*dy);

        if(length < 10){

            if(rand() > 0.95){

                u.q = ~~(rand()*heartPointsCount);

            }else{

                if(rand() > 0.99){
                    u.D *= -1;
                }

                u.q += u.D;

                u.q %= heartPointsCount;

                if(u.q < 0){
                    u.q += heartPointsCount;
                }
            }
        }

        u.vx += -dx / length * u.speed;
        u.vy += -dy / length * u.speed;

        u.trace[0].x += u.vx;
        u.trace[0].y += u.vy;

        u.vx *= u.force;
        u.vy *= u.force;

        for(let k=0;k<u.trace.length-1;){

            const T = u.trace[k];
            const N = u.trace[++k];

            N.x -= config.traceK * (N.x - T.x);
            N.y -= config.traceK * (N.y - T.y);
        }

        ctx.fillStyle = u.f;

        for(let k=0;k<u.trace.length;k++){

            ctx.fillRect(
                u.trace[k].x,
                u.trace[k].y,
                1.5,
                1.5
            );
        }
    }
}

requestAnimationFrame(loop);

</script>

</body>
</html>
