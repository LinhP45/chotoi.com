<!DOCTYPE HTML>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">

<title>Dành cho Thanh Xuân của tôi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}

</style>
</head>

<body>

<canvas id="heart"></canvas>

<script>

// ===== CANVAS =====

const canvas =
    document.getElementById("heart");

const ctx =
    canvas.getContext("2d",{
        alpha:true,
        desynchronized:true
    });

// ===== MOBILE =====

const mobile =

    /android|iphone|ipad|ipod/i
    .test(navigator.userAgent)

    ||

    window.innerWidth < 768;

// ===== GLOBAL =====

let width;
let height;
let ratio;
let viewScale = 1;

let traceCount;
let dr;
let heartScale;

const rand = Math.random;

const pointsOrigin = [];
const targetPoints = [];
const particles = [];

// ===== RESIZE =====

function resize(){

    const visual =
        window.visualViewport;

    let rawScale = visual
        ? visual.scale
        : 1;

    // ===== FIX 200% MOBILE ZOOM =====

    if(
        rawScale > 1.7 &&
        rawScale < 2.3
    ){

        viewScale = 2;

    }else{

        viewScale = rawScale;
    }

    ratio = Math.min(
        window.devicePixelRatio || 1,
        2
    );

    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width =
        width * ratio;

    canvas.height =
        height * ratio;

    canvas.style.width =
        width + "px";

    canvas.style.height =
        height + "px";

    ctx.setTransform(
        ratio,
        0,
        0,
        ratio,
        0,
        0
    );

    createHeart();
}

window.addEventListener(
    "resize",
    resize
);

if(window.visualViewport){

    visualViewport.addEventListener(
        "resize",
        resize
    );

    visualViewport.addEventListener(
        "scroll",
        resize
    );
}

// ===== HEART FORMULA =====

function heartPosition(rad){

    return [

        Math.pow(
            Math.sin(rad),
            3
        ),

        -(
            15 * Math.cos(rad)
            - 5 * Math.cos(2 * rad)
            - 2 * Math.cos(3 * rad)
            - Math.cos(4 * rad)
        )
    ];
}

function scaleAndTranslate(
    pos,
    sx,
    sy,
    dx,
    dy
){

    return [

        dx + pos[0] * sx,

        dy + pos[1] * sy
    ];
}

// ===== CREATE HEART =====

function createHeart(){

    pointsOrigin.length = 0;
    particles.length = 0;

    traceCount = mobile
        ? 35
        : 55;

    dr = mobile
        ? 0.18
        : 0.10;

    // ===== KEEP HEART SIZE STABLE =====

    const zoomCompensation =

        viewScale >= 2
            ? 1
            : 1 / viewScale;

    const base =

        Math.min(width,height) *
        zoomCompensation;

    heartScale = mobile
        ? base * 0.23
        : base * 0.26;

    // ===== OUTER =====

    for(
        let i = 0;
        i < Math.PI * 2;
        i += dr
    ){

        pointsOrigin.push(

            scaleAndTranslate(

                heartPosition(i),

                heartScale,

                heartScale * 0.06,

                0,
                0
            )
        );
    }

    // ===== MIDDLE =====

    for(
        let i = 0;
        i < Math.PI * 2;
        i += dr
    ){

        pointsOrigin.push(

            scaleAndTranslate(

                heartPosition(i),

                heartScale * 0.72,

                heartScale * 0.045,

                0,
                0
            )
        );
    }

    // ===== INNER =====

    for(
        let i = 0;
        i < Math.PI * 2;
        i += dr
    ){

        pointsOrigin.push(

            scaleAndTranslate(

                heartPosition(i),

                heartScale * 0.42,

                heartScale * 0.025,

                0,
                0
            )
        );
    }

    createParticles();
}

// ===== PULSE =====

function pulse(scale){

    const centerX =
        width / 2;

    const centerY =
        height / 2;

    for(
        let i = 0;
        i < pointsOrigin.length;
        i++
    ){

        targetPoints[i] = [

            pointsOrigin[i][0] *
            scale +
            centerX,

            pointsOrigin[i][1] *
            scale +
            centerY
        ];
    }
}

// ===== PARTICLES =====

function createParticles(){

    const count =
        pointsOrigin.length;

    for(let i=0;i<count;i++){

        const x =
            rand() * width;

        const y =
            rand() * height;

        const hue =
            340 + rand() * 20;

        particles[i] = {

            vx:0,
            vy:0,

            speed:

                mobile

                ? rand() * 0.5 + 2.8

                : rand() * 0.8 + 4.2,

            q:~~(
                rand() * count
            ),

            D:
                2 * (i % 2) - 1,

            force:

                mobile
                ? 0.94
                : 0.92,

            color:

                "hsla(" +

                hue +

                ",100%,65%,0.55)",

            trace:[]
        };

        for(
            let k=0;
            k<traceCount;
            k++
        ){

            particles[i].trace[k] = {

                x:x,
                y:y
            };
        }
    }
}

// ===== STRONGER HEARTBEAT =====

function realisticHeartbeat(t){

    const bpm =
        mobile
        ? 72
        : 75;

    const beatDuration =
        60 / bpm;

    const phase =

        (t % beatDuration) /
        beatDuration;

    let scale = 1;

    // ===== MAIN BEAT =====
    // stronger contraction

    if(phase < 0.12){

        scale +=

            Math.sin(

                phase /
                0.12 *
                Math.PI

            ) * 0.28;
    }

    // ===== SECONDARY BEAT =====

    else if(
        phase > 0.18 &&
        phase < 0.30
    ){

        scale +=

            Math.sin(

                (
                    phase - 0.18
                ) /
                0.12 *
                Math.PI

            ) * 0.13;
    }

    // ===== MICRO VIBRATION =====

    scale +=
        Math.sin(t * 8) * 0.008;

    return scale;
}

// ===== CONFIG =====

const config = {

    traceK:

        mobile
        ? 0.22
        : 0.35
};

// ===== LOOP =====

let start =
    performance.now();

function loop(now){

    requestAnimationFrame(loop);

    const t =

        (now - start) / 1000;

    const scale =
        realisticHeartbeat(t);

    pulse(scale);

    // ===== BG FADE =====

    ctx.fillStyle =

        mobile

        ? "rgba(0,0,0,0.16)"

        : "rgba(0,0,0,0.12)";

    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    // ===== GLOW =====

    const glow =

        ctx.createRadialGradient(

            width / 2,
            height / 2,
            20,

            width / 2,
            height / 2,

            mobile
                ? 220
                : 320
        );

    glow.addColorStop(
        0,
        "rgba(255,0,80,0.20)"
    );

    glow.addColorStop(
        1,
        "rgba(255,0,0,0)"
    );

    ctx.fillStyle = glow;

    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    // ===== PARTICLES =====

    for(
        let i = particles.length;
        i--;
    ){

        const u =
            particles[i];

        const q =
            targetPoints[u.q];

        const dx =

            u.trace[0].x - q[0];

        const dy =

            u.trace[0].y - q[1];

        const length =

            Math.sqrt(
                dx*dx +
                dy*dy
            ) || 0.001;

        if(length < 10){

            if(rand() > 0.96){

                u.q = ~~(

                    rand() *
                    targetPoints.length
                );

            }else{

                if(rand() > 0.995){

                    u.D *= -1;
                }

                u.q += u.D;

                u.q %=
                    targetPoints.length;

                if(u.q < 0){

                    u.q +=
                    targetPoints.length;
                }
            }
        }

        u.vx +=

            -dx / length *
            u.speed;

        u.vy +=

            -dy / length *
            u.speed;

        u.trace[0].x += u.vx;
        u.trace[0].y += u.vy;

        u.vx *= u.force;
        u.vy *= u.force;

        for(
            let k=0;
            k<u.trace.length-1;
        ){

            const T =
                u.trace[k];

            const N =
                u.trace[++k];

            N.x -=

                config.traceK *
                (N.x - T.x);

            N.y -=

                config.traceK *
                (N.y - T.y);
        }

        ctx.fillStyle =
            u.color;

        const size =

            mobile
            ? 2
            : 1.5;

        for(
            let k=0;
            k<u.trace.length;
            k++
        ){

            ctx.fillRect(

                u.trace[k].x,
                u.trace[k].y,

                size,
                size
            );
        }
    }
}

// ===== START =====

resize();

requestAnimationFrame(loop);

// ===== PREVENT MOBILE SCROLL =====

document.addEventListener(

    "touchmove",

    e => e.preventDefault(),

    {
        passive:false
    }
);

</script>

</body>
</html>
